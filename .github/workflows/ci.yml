name: ci.yml
on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'docs/**'
      - README.md

  # Allow manual run
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Compile
        run: |
          npm ci
          npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          name: build-artifact
          path: build/client
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: build

    # Permissions to update GitHub Pages
    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        with:
          artifact_name: build-artifact
